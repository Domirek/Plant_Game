<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Focus Garden</title>
  <link rel="stylesheet" href="styles/style.css" />
</head>
<body>
  <div id="app">
    <canvas id="game-canvas"></canvas>

    <div id="ui">
      <div id="top-bar">
        <div id="coins">0 <span class="icon">🪙</span></div>
        <div id="game-title">Focus Garden</div>
      </div>

      <div id="left-panel">
        <button id="shop-btn">🏪 Shop</button>
        <div class="panel-title">📋 Daily Quests</div>
        <div id="daily-items"></div>
        <div class="panel-title sep">🏆 Achievements</div>
        <div id="achievement-items"></div>
      </div>

      <div id="side-panel">
        <div class="panel-title">New Focus Session</div>
        <input id="task-input" type="text" placeholder="What will you focus on?" />
        <div class="section-label">Choose a plant</div>
        <div id="plant-select"></div>
        <div class="section-label">Duration</div>
        <div id="time-row">
          <button class="preset-btn selected" data-min="5">5m</button>
          <button class="preset-btn" data-min="15">15m</button>
          <button class="preset-btn" data-min="25">25m</button>
          <button class="preset-btn" data-min="45">45m</button>
          <button class="preset-btn" data-min="60">60m</button>
          <input id="custom-time" type="number" min="1" max="999" placeholder="Custom min" />
        </div>
        <div id="setup-hint">Click a garden bed to start</div>

        <div id="session-list" class="hidden">
          <div class="panel-title sep">Growing</div>
          <div id="session-items"></div>
        </div>
      </div>

      <div id="bed-labels"></div>
      <div id="meow-label" class="hidden"></div>

      <div id="notifications"></div>

      <div id="shop-panel" class="hidden">
        <div id="shop-header">
          <span>🏪 Shop</span>
          <button id="shop-close">✕</button>
        </div>
        <div id="shop-items"></div>
      </div>

      <div id="hint">Set your task, pick a plant, choose time — then click a garden bed</div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
